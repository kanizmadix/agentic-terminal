<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Fira Code',monospace; background:#010801; color:#b8f0b8; height:100vh; display:flex; flex-direction:column; }
    #header { padding:8px 16px; background:#040f04; border-bottom:1px solid #0f2a0f; color:#00ff41; font-size:12px; font-weight:700; letter-spacing:2px; display:flex; justify-content:space-between; align-items:center; }
    #output { flex:1; overflow-y:auto; padding:16px; font-size:13px; line-height:1.6; }
    #output::-webkit-scrollbar { width:3px; } #output::-webkit-scrollbar-thumb { background:#005c18; }
    #input-area { display:flex; align-items:center; padding:8px 16px; background:#040f04; border-top:1px solid #0f2a0f; gap:8px; }
    #input { flex:1; background:none; border:none; outline:none; color:#b8f0b8; font-family:inherit; font-size:13px; caret-color:#00ff41; }
    #input::placeholder { color:#3d6e3d; }
    #send { background:none; border:1px solid #005c18; color:#00ff41; padding:5px 13px; cursor:pointer; font-family:inherit; font-size:10px; letter-spacing:1px; }
    #send:hover { background:rgba(0,255,65,.09); }
    .prompt-sym { color:#00ff41; font-size:15px; }
    .msg { margin-bottom:12px; }
    .msg-role { font-size:10px; color:#3d6e3d; margin-bottom:3px; letter-spacing:1px; }
  </style>
</head>
<body>
  <div id="header">
    <span>▓ AI TERMINAL v0.1.0</span>
    <span style="color:#3d6e3d;font-size:10px">● OFFLINE</span>
  </div>
  <div id="output"></div>
  <div id="input-area">
    <span class="prompt-sym">❯</span>
    <input id="input" placeholder="Type a message..." />
    <button id="send">SEND ↵</button>
  </div>
  <script>
    const $out = document.getElementById('output');
    const $in  = document.getElementById('input');
    function addMsg(role, text) {
      const d = document.createElement('div');
      d.className = 'msg';
      d.innerHTML = '<div class="msg-role">' + role + '</div><div>' + text + '</div>';
      $out.appendChild(d); $out.scrollTop = $out.scrollHeight; return d;
    }
    addMsg('SYSTEM', 'Terminal ready.');
    document.getElementById('send').addEventListener('click', () => {
      const v = $in.value.trim(); if (!v) return;
      addMsg('YOU', v); $in.value = '';
      addMsg('AI', '[ API integration coming soon ]');
    });
    $in.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('send').click();} });
  </script>
</body>
</html>
