<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI MULTI-AGENT TERMINAL</title>

  <!-- CDN libs -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #010801;
      --bg2:       #040f04;
      --bg3:       #071207;
      --green:     #00ff41;
      --green-dim: #005c18;
      --cyan:      #00d4ff;
      --magenta:   #ff44ff;
      --orange:    #ffaa00;
      --red:       #ff3b30;
      --text:      #b8f0b8;
      --text-dim:  #3d6e3d;
      --border:    #0f2a0f;
      --glow-g:    0 0 12px rgba(0,255,65,.55);
      --glow-c:    0 0 12px rgba(0,212,255,.55);
      --glow-m:    0 0 12px rgba(255,68,255,.55);
      --glow-o:    0 0 12px rgba(255,170,0,.55);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fira Code', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 2px,
        rgba(0,255,65,.012) 2px, rgba(0,255,65,.012) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ─────────────────────────────────── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #logo {
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-shadow: var(--glow-g);
    }
    #logo span { color: var(--text-dim); font-weight: 400; }
    #hdr-right {
      display: flex; gap: 20px; align-items: center;
      font-size: 10px; letter-spacing: .5px;
    }
    #api-status { animation: pulse 2s infinite; }
    #api-status.ok    { color: var(--green); }
    #api-status.err   { color: var(--red); animation: none; }
    #model-disp { color: var(--text-dim); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── TABS ────────────────────────────────────── */
    #tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 7px 22px;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1.5px;
      transition: all .15s;
      position: relative;
    }
    .tab:hover { color: var(--text); background: rgba(0,255,65,.04); }
    .tab::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: transparent;
      transition: all .15s;
    }
    .tab[data-a="researcher"].active { color: var(--cyan);    text-shadow: var(--glow-c); }
    .tab[data-a="researcher"].active::after { background: var(--cyan);    box-shadow: var(--glow-c); }
    .tab[data-a="coder"].active      { color: var(--green);   text-shadow: var(--glow-g); }
    .tab[data-a="coder"].active::after { background: var(--green);   box-shadow: var(--glow-g); }
    .tab[data-a="creative"].active   { color: var(--magenta); text-shadow: var(--glow-m); }
    .tab[data-a="creative"].active::after { background: var(--magenta); box-shadow: var(--glow-m); }
    .tab[data-a="analyst"].active    { color: var(--orange);  text-shadow: var(--glow-o); }
    .tab[data-a="analyst"].active::after { background: var(--orange);  box-shadow: var(--glow-o); }
    .tab-badge {
      display: inline-block;
      background: var(--green-dim);
      color: var(--green);
      border-radius: 99px;
      padding: 0 5px;
      font-size: 9px;
      margin-left: 5px;
    }
    .tab[data-a="researcher"] .tab-badge { background: rgba(0,212,255,.15); color: var(--cyan); }
    .tab[data-a="creative"]   .tab-badge { background: rgba(255,68,255,.15); color: var(--magenta); }
    .tab[data-a="analyst"]    .tab-badge { background: rgba(255,170,0,.15);  color: var(--orange); }

    /* ── OUTPUT ──────────────────────────────────── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      scroll-behavior: smooth;
    }
    #output::-webkit-scrollbar { width: 3px; }
    #output::-webkit-scrollbar-track { background: var(--bg); }
    #output::-webkit-scrollbar-thumb { background: var(--green-dim); }

    /* ── MESSAGES ────────────────────────────────── */
    .msg { margin-bottom: 14px; animation: fadeUp .18s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

    .msg-hdr {
      font-size: 9.5px;
      color: var(--text-dim);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .msg-hdr .role { font-weight: 700; letter-spacing: 1px; }
    .msg-body {
      padding: 8px 12px;
      border-left: 2px solid var(--border);
      line-height: 1.65;
    }
    .user-msg .msg-body  { border-color: var(--green-dim); }
    .sys-msg .msg-body   { border-color: var(--border); color: var(--text-dim); font-size: 11px; }
    .err-msg .msg-body   { border-color: var(--red); color: var(--red); font-size: 11px; }
    .boot-msg .msg-body  { border: none; color: var(--text-dim); font-size: 10.5px; padding: 1px 0; }

    /* markdown */
    .msg-body h1,.msg-body h2,.msg-body h3 { color: var(--green); margin: 10px 0 5px; }
    .msg-body h1 { font-size: 15px; } .msg-body h2 { font-size: 13px; } .msg-body h3 { font-size: 12px; }
    .msg-body p  { margin-bottom: 7px; }
    .msg-body ul,.msg-body ol { padding-left: 20px; margin-bottom: 7px; }
    .msg-body li { margin-bottom: 2px; }
    .msg-body code {
      background: rgba(0,255,65,.09);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11.5px;
      color: var(--green);
    }
    .msg-body pre {
      background: #050f05;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-body pre code { background: none; border: none; padding: 0; font-size: 12px; color: inherit; }
    .msg-body blockquote { border-left: 3px solid var(--green-dim); padding-left: 12px; color: var(--text-dim); margin: 7px 0; }
    .msg-body a { color: var(--cyan); text-decoration: none; }
    .msg-body a:hover { text-decoration: underline; }
    .msg-body table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
    .msg-body th { background: rgba(0,255,65,.08); color: var(--green); padding: 5px 10px; border: 1px solid var(--border); text-align: left; }
    .msg-body td { padding: 4px 10px; border: 1px solid var(--border); }
    .msg-body strong { color: var(--text); }
    .msg-body em { color: var(--text-dim); font-style: italic; }
    .msg-body hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* mermaid */
    .mermaid-wrap {
      background: #050f05;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      margin: 8px 0;
      overflow-x: auto;
      text-align: center;
    }
    .mermaid-wrap svg { max-width: 100%; }
    .mermaid-err { color: var(--red); font-size: 11px; }

    /* streaming cursor */
    .s-cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--green);
      animation: blink .7s infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* tool results */
    .tool-box {
      background: rgba(0,212,255,.04);
      border: 1px solid rgba(0,212,255,.18);
      border-radius: 4px;
      padding: 10px 13px;
      margin: 6px 0;
      font-size: 11.5px;
    }
    .tool-box .tool-hdr {
      color: var(--cyan);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 7px;
    }
    .tool-box a { color: var(--cyan); }
    .tool-box .topic-row { padding: 2px 0 2px 10px; color: var(--text); border-left: 1px solid var(--border); }

    /* hljs */
    .hljs { background: transparent !important; }

    /* ── INPUT ───────────────────────────────────── */
    #input-area {
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    #input-wrap {
      display: flex;
      align-items: flex-end;
      padding: 8px 12px;
      gap: 8px;
      position: relative;
    }
    #prompt-sym {
      font-size: 15px;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      flex-shrink: 0;
      padding-bottom: 2px;
      transition: color .2s, text-shadow .2s;
    }
    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      resize: none;
      max-height: 120px;
      line-height: 1.45;
      caret-color: var(--green);
    }
    #input::placeholder { color: var(--text-dim); }
    #send-btn {
      background: none;
      border: 1px solid var(--green-dim);
      color: var(--green);
      padding: 5px 13px;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1.5px;
      transition: all .15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) {
      background: rgba(0,255,65,.1);
      border-color: var(--green);
      box-shadow: var(--glow-g);
    }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn.stop { border-color: var(--red); color: var(--red); }
    #send-btn.stop:hover { background: rgba(255,59,48,.1); border-color: var(--red); box-shadow: 0 0 12px rgba(255,59,48,.4); }

    /* autocomplete */
    #autocomplete {
      position: absolute;
      bottom: 100%;
      left: 0; right: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-bottom: none;
      display: none;
      font-size: 11px;
      z-index: 100;
    }
    .ac-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 14px;
      cursor: pointer;
      gap: 16px;
    }
    .ac-item:hover, .ac-item.sel {
      background: rgba(0,255,65,.08);
    }
    .ac-cmd { color: var(--green); flex-shrink: 0; }
    .ac-hint { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── STATUS BAR ──────────────────────────────── */
    #status-bar {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 3px 14px 5px;
      font-size: 9.5px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      letter-spacing: .4px;
      gap: 8px;
    }
    #status-bar b { font-weight: 600; }

    /* ── MODAL ───────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.82);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 22px 26px;
      max-width: 560px;
      width: 94%;
      box-shadow: 0 0 60px rgba(0,255,65,.15);
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h2 { color: var(--green); font-size: 12px; letter-spacing: 3px; margin-bottom: 16px; text-shadow: var(--glow-g); }
    .modal-close {
      margin-top: 18px;
      background: none;
      border: 1px solid var(--green-dim);
      color: var(--green);
      padding: 6px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
    }
    .modal-close:hover { background: rgba(0,255,65,.08); }
    .help-row { display: flex; gap: 14px; margin-bottom: 5px; font-size: 11.5px; }
    .help-cmd  { color: var(--green); min-width: 170px; flex-shrink: 0; }
    .help-desc { color: var(--text-dim); }
    .help-section { color: var(--green); font-size: 10px; letter-spacing: 1px; margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 3px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">▓ AI MULTI-AGENT TERMINAL <span>v1.0.0</span></div>
  <div id="hdr-right">
    <span id="api-status" class="ok">● ONLINE</span>
    <span id="model-disp">claude-sonnet-4-6</span>
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab active" data-a="researcher">◈ RESEARCHER</button>
  <button class="tab"        data-a="coder">⌥ CODER</button>
  <button class="tab"        data-a="creative">✦ CREATIVE</button>
  <button class="tab"        data-a="analyst">◎ ANALYST</button>
</div>

<!-- OUTPUT -->
<div id="output"></div>

<!-- INPUT -->
<div id="input-area">
  <div id="input-wrap">
    <div id="autocomplete"></div>
    <span id="prompt-sym">❯</span>
    <textarea id="input" rows="1" placeholder="Message or /help for commands…" spellcheck="false"></textarea>
    <button id="send-btn">SEND ↵</button>
  </div>
  <div id="status-bar">
    <span id="sb-agent">agent:<b id="sb-a-name" style="color:var(--cyan)">researcher</b></span>
    <span>model:<b id="sb-model">claude-sonnet-4-6</b></span>
    <span>tokens:<b id="sb-tokens">0</b></span>
    <span>msgs:<b id="sb-msgs">0</b></span>
    <span style="color:var(--text-dim)">⌃1-4 switch · ↑↓ history · Tab autocomplete</span>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">HELP</h2>
    <div id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">[ CLOSE ]</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// INIT LIBS
// ═══════════════════════════════════════════════════════════
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#004a10',
    primaryTextColor: '#00ff41',
    primaryBorderColor: '#007a20',
    lineColor: '#00c030',
    background: '#010801',
    mainBkg: '#040f04',
    nodeBorder: '#007a20',
    clusterBkg: '#020c02',
    titleColor: '#00ff41',
    edgeLabelBackground: '#040f04',
    fontFamily: "'Fira Code', monospace",
  },
});

marked.use({
  renderer: (() => {
    const r = new marked.Renderer();
    r.code = ({ text, lang }) => {
      if (lang === 'mermaid') {
        return `<div class="mermaid-pending" data-code="${encodeURIComponent(text)}"></div>`;
      }
      const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
      const highlighted = hljs.highlight(text, { language, ignoreIllegals: true }).value;
      return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
    };
    return r;
  })(),
});

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  agent: 'researcher',
  model: 'claude-sonnet-4-6',
  convos: { researcher: [], coder: [], creative: [], analyst: [] },
  tokens: { researcher: 0, coder: 0, creative: 0, analyst: 0 },
  streaming: false,
  ctrl: null,
  history: [],
  histIdx: -1,
};

const AGENTS = {
  researcher: {
    label: 'RESEARCHER', sym: '◈',
    color: 'var(--cyan)', glow: 'var(--glow-c)',
    greeting: 'Research specialist **online**. I synthesize information deeply and think critically.\n\n- Use `/search [query]` for DuckDuckGo instant answers\n- Use `/wiki [topic]` for Wikipedia summaries\n- Or just ask me anything — I reason from first principles.',
  },
  coder: {
    label: 'CODER', sym: '⌥',
    color: 'var(--green)', glow: 'var(--glow-g)',
    greeting: 'Code assistant **ready**. I write clean, production-grade code in any language.\n\n- Ask me to build, debug, review, or explain any code\n- Use `/diagram [description]` to generate architecture diagrams\n- I output proper syntax-highlighted code blocks',
  },
  creative: {
    label: 'CREATIVE', sym: '✦',
    color: 'var(--magenta)', glow: 'var(--glow-m)',
    greeting: 'Creative engine **initialized**. Stories, poetry, scripts, worldbuilding, marketing copy — anything.\n\n*What shall we create?*',
  },
  analyst: {
    label: 'ANALYST', sym: '◎',
    color: 'var(--orange)', glow: 'var(--glow-o)',
    greeting: 'Strategic analyst **online**. I apply frameworks with precision and give clear, actionable recommendations.\n\n- SWOT, Porter\'s Five Forces, OKRs, Jobs-to-be-Done and more\n- Use `/diagram [description]` to generate decision trees or flowcharts',
  },
};

const COMMANDS = [
  { cmd: '/help',    hint: 'Show all commands' },
  { cmd: '/clear',   hint: 'Clear current agent chat' },
  { cmd: '/clearall',hint: 'Clear all agent chats' },
  { cmd: '/search',  hint: '/search [query]  —  DuckDuckGo web search' },
  { cmd: '/wiki',    hint: '/wiki [topic]  —  Wikipedia article summary' },
  { cmd: '/diagram', hint: '/diagram [description]  —  Generate Mermaid diagram' },
  { cmd: '/model',   hint: '/model [sonnet|opus|haiku]  —  Switch Claude model' },
  { cmd: '/export',  hint: 'Download current chat as HTML' },
  { cmd: '/agent',   hint: '/agent [researcher|coder|creative|analyst]' },
  { cmd: '/tokens',  hint: 'Show per-agent token usage' },
  { cmd: '/stop',    hint: 'Stop the current streaming response' },
];

// ═══════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════
const $out    = document.getElementById('output');
const $input  = document.getElementById('input');
const $sendBtn= document.getElementById('send-btn');
const $tabs   = document.querySelectorAll('.tab');
const $psym   = document.getElementById('prompt-sym');
const $ac     = document.getElementById('autocomplete');
const $sbA    = document.getElementById('sb-a-name');
const $sbM    = document.getElementById('sb-model');
const $sbT    = document.getElementById('sb-tokens');
const $sbMsg  = document.getElementById('sb-msgs');
const $apiSt  = document.getElementById('api-status');
const $mDisp  = document.getElementById('model-disp');

// ═══════════════════════════════════════════════════════════
// RENDERING HELPERS
// ═══════════════════════════════════════════════════════════
function esc(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text) {
  try { return marked.parse(text); } catch { return esc(text); }
}

async function renderMermaidIn(el) {
  const pending = el.querySelectorAll('.mermaid-pending');
  for (let i = 0; i < pending.length; i++) {
    const block = pending[i];
    const code = decodeURIComponent(block.dataset.code);
    const id = `mm-${Date.now()}-${i}`;
    const wrap = document.createElement('div');
    wrap.className = 'mermaid-wrap';
    try {
      const { svg } = await mermaid.render(id, code);
      wrap.innerHTML = svg;
    } catch (e) {
      wrap.innerHTML = `<pre class="mermaid-err">${esc(code)}\n\n⚠ Render error: ${esc(e.message)}</pre>`;
    }
    block.replaceWith(wrap);
  }
}

function scrollBot() { $out.scrollTop = $out.scrollHeight; }
function ts() { return new Date().toLocaleTimeString('en-US',{hour12:false}); }

// ═══════════════════════════════════════════════════════════
// ADD MESSAGES
// ═══════════════════════════════════════════════════════════
function addBoot(text) {
  const d = document.createElement('div');
  d.className = 'msg boot-msg';
  d.innerHTML = `<div class="msg-body">${esc(text)}</div>`;
  $out.appendChild(d); scrollBot();
}

function addSys(text, type='sys') {
  const d = document.createElement('div');
  d.className = `msg ${type}-msg`;
  d.innerHTML = `<div class="msg-body">${esc(text)}</div>`;
  $out.appendChild(d); scrollBot();
  return d;
}

function addRaw(html) {
  const d = document.createElement('div');
  d.className = 'msg sys-msg';
  d.innerHTML = `<div class="msg-body">${html}</div>`;
  $out.appendChild(d); scrollBot();
}

function addMsg({ role, content, agent, streaming=false }) {
  const cfg = AGENTS[agent || S.agent];
  const d = document.createElement('div');
  d.className = `msg ${role==='user'?'user':'asst'}-msg`;

  const roleLabel = role==='user' ? 'YOU' : cfg.label;
  const roleColor = role==='user' ? 'var(--green)' : cfg.color;

  d.innerHTML = `
    <div class="msg-hdr">
      <span class="role" style="color:${roleColor}">${cfg.sym} ${roleLabel}</span>
      <span>${ts()}</span>
    </div>
    <div class="msg-body">${
      streaming
        ? '<span class="s-cursor"></span>'
        : renderMd(content)
    }</div>`;

  $out.appendChild(d); scrollBot();
  if (!streaming) renderMermaidIn(d);
  return d;
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
async function boot() {
  const lines = [
    'Initializing AI Multi-Agent Terminal v1.0.0…',
    'Mermaid diagram engine ............. loaded',
    'Markdown + syntax highlight ......... loaded',
    'Streaming SSE client ................ ready',
    'Checking server connection…',
  ];
  for (const l of lines) { addBoot(l); await sleep(70); }

  const ok = await checkServer();
  if (ok) {
    addBoot('Server ● CONNECTED  ✓');
  } else {
    addSys('⚠  Server not running. Start it: cd terminal && npm install && npm start', 'err');
    $apiSt.textContent = '● OFFLINE';
    $apiSt.className = 'err';
  }

  addBoot('━'.repeat(58));
  await sleep(60);
  showGreeting('researcher');
}

async function checkServer() {
  try {
    const r = await fetch('/api/agents', { signal: AbortSignal.timeout(2500) });
    return r.ok;
  } catch { return false; }
}

function showGreeting(agent) {
  addMsg({ role:'assistant', content: AGENTS[agent].greeting, agent });
}

// ═══════════════════════════════════════════════════════════
// SEND
// ═══════════════════════════════════════════════════════════
async function sendMsg(text) {
  if (!text.trim() || S.streaming) return;
  if (text.startsWith('/')) { handleCmd(text); return; }

  S.history.unshift(text);
  if (S.history.length > 60) S.history.pop();
  S.histIdx = -1;

  const agent = S.agent;
  addMsg({ role:'user', content: text });
  S.convos[agent].push({ role:'user', content: text });

  const aDiv = addMsg({ role:'assistant', content:'', agent, streaming:true });
  const body = aDiv.querySelector('.msg-body');

  S.streaming = true;
  sendBtnStop();

  let full = '';
  const ctrl = new AbortController();
  S.ctrl = ctrl;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ agent, messages: S.convos[agent], model: S.model }),
      signal: ctrl.signal,
    });
    if (!resp.ok) throw new Error(`Server ${resp.status}: ${await resp.text()}`);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.type === 'text') {
            full += d.text;
            body.innerHTML = renderMd(full) + '<span class="s-cursor"></span>';
            scrollBot();
          } else if (d.type === 'done') {
            if (d.usage) {
              S.tokens[agent] += (d.usage.input_tokens||0) + (d.usage.output_tokens||0);
            }
          } else if (d.type === 'error') {
            throw new Error(d.error);
          }
        } catch (e) { if (!(e instanceof SyntaxError)) throw e; }
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') full += '\n\n*[Stopped]*';
    else { addSys(`Error: ${e.message}`, 'err'); full = full || '*[Error]*'; }
  } finally {
    body.innerHTML = renderMd(full || '…');
    renderMermaidIn(aDiv);
    if (full && full !== '…') S.convos[agent].push({ role:'assistant', content: full });
    S.streaming = false;
    S.ctrl = null;
    sendBtnReady();
    updateSB(); updateBadges();
  }
}

function stopStream() { S.ctrl?.abort(); }

function sendBtnStop() {
  $sendBtn.textContent = '■ STOP';
  $sendBtn.classList.add('stop');
  $sendBtn.onclick = stopStream;
}
function sendBtnReady() {
  $sendBtn.textContent = 'SEND ↵';
  $sendBtn.classList.remove('stop');
  $sendBtn.onclick = null;
  $sendBtn.disabled = false;
}

// ═══════════════════════════════════════════════════════════
// COMMANDS
// ═══════════════════════════════════════════════════════════
async function handleCmd(text) {
  const parts = text.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');

  switch (cmd) {
    case '/help':    showHelp(); break;
    case '/clear':   clearChat(); break;
    case '/clearall':clearAll(); break;
    case '/search':
      args ? await doSearch(args) : addSys('Usage: /search [query]','err'); break;
    case '/wiki':
      args ? await doWiki(args) : addSys('Usage: /wiki [topic]','err'); break;
    case '/diagram':
      args ? await doDiagram(args) : addSys('Usage: /diagram [description]','err'); break;
    case '/model':   args ? switchModel(args) : addSys(`Current model: ${S.model}`); break;
    case '/export':  exportChat(); break;
    case '/agent':
      args && AGENTS[args.toLowerCase()]
        ? switchAgent(args.toLowerCase())
        : addSys('Usage: /agent [researcher|coder|creative|analyst]','err');
      break;
    case '/tokens':  showTokens(); break;
    case '/stop':    stopStream(); break;
    default: addSys(`Unknown command: ${cmd}  —  type /help`,'err');
  }
}

function showHelp() {
  const rows = COMMANDS.map(c =>
    `<div class="help-row"><span class="help-cmd">${esc(c.cmd)}</span><span class="help-desc">${esc(c.hint)}</span></div>`
  ).join('');
  document.getElementById('modal-title').textContent = '◈ COMMANDS';
  document.getElementById('modal-body').innerHTML = `
    <div class="help-section">COMMANDS</div>
    ${rows}
    <div class="help-section">KEYBOARD</div>
    <div class="help-row"><span class="help-cmd">Enter</span><span class="help-desc">Send message</span></div>
    <div class="help-row"><span class="help-cmd">Shift+Enter</span><span class="help-desc">New line</span></div>
    <div class="help-row"><span class="help-cmd">↑ / ↓</span><span class="help-desc">Input history</span></div>
    <div class="help-row"><span class="help-cmd">Tab</span><span class="help-desc">Autocomplete command</span></div>
    <div class="help-row"><span class="help-cmd">Ctrl/⌘ + 1–4</span><span class="help-desc">Switch agent tabs</span></div>
    <div class="help-row"><span class="help-cmd">Escape</span><span class="help-desc">Close this dialog</span></div>
    <div class="help-section">MERMAID DIAGRAMS</div>
    <div style="color:var(--text-dim);font-size:11.5px">
      The AI will automatically render Mermaid diagrams in its responses.<br>
      You can also generate one directly with <span style="color:var(--green)">/diagram [description]</span>.<br>
      Supported: flowchart, sequenceDiagram, classDiagram, erDiagram, gantt, pie, mindmap…
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function clearChat() {
  const a = S.agent;
  S.convos[a] = []; S.tokens[a] = 0;
  $out.innerHTML = '';
  addSys(`[${a.toUpperCase()}] Chat cleared.`);
  showGreeting(a);
  updateSB(); updateBadges();
}

function clearAll() {
  ['researcher','coder','creative','analyst'].forEach(a => { S.convos[a]=[]; S.tokens[a]=0; });
  $out.innerHTML = '';
  addSys('All agent chats cleared.');
  showGreeting(S.agent);
  updateSB(); updateBadges();
}

async function doSearch(q) {
  addSys(`Searching: "${q}"…`);
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    let html = `<div class="tool-box"><div class="tool-hdr">◈ WEB SEARCH — ${esc(q)}</div>`;
    if (d.answer) html += `<div style="color:var(--green);margin-bottom:7px"><b>${esc(d.answer)}</b></div>`;
    if (d.abstractText) {
      html += `<div style="margin-bottom:6px">${esc(d.abstractText)}</div>`;
      if (d.abstractUrl) html += `<div><a href="${esc(d.abstractUrl)}" target="_blank">→ ${esc(d.abstractSource)}</a></div>`;
    }
    if (d.relatedTopics?.length) {
      html += `<div style="margin-top:8px;color:var(--text-dim);font-size:10px;letter-spacing:.5px">RELATED TOPICS</div>`;
      d.relatedTopics.forEach(t => {
        if (t.text) html += `<div class="topic-row">${esc(t.text.substring(0,150))}${t.text.length>150?'…':''}</div>`;
      });
    }
    if (!d.abstractText && !d.answer && !d.relatedTopics?.length) {
      html += `<div style="color:var(--text-dim)">No instant results. Try refining your query or use /wiki.</div>`;
    }
    html += '</div>';
    addRaw(html);
  } catch(e) { addSys(`Search error: ${e.message}`,'err'); }
}

async function doWiki(topic) {
  addSys(`Looking up: "${topic}"…`);
  try {
    const r = await fetch(`/api/wiki?topic=${encodeURIComponent(topic)}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    let html = `<div class="tool-box">
      <div class="tool-hdr">◈ WIKIPEDIA — ${esc(d.title||topic)}</div>
      <div style="margin-bottom:7px">${esc(d.extract||'No extract available.')}</div>`;
    if (d.url) html += `<div><a href="${esc(d.url)}" target="_blank">→ Read full article on Wikipedia</a></div>`;
    html += '</div>';
    addRaw(html);
  } catch(e) { addSys(`Wiki error: ${e.message}`,'err'); }
}

async function doDiagram(desc) {
  addSys(`Generating diagram: "${desc}"…`);
  try {
    const r = await fetch('/api/diagram', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ description: desc }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    const id = `cmd-mm-${Date.now()}`;
    const wrap = document.createElement('div');
    wrap.className = 'mermaid-wrap';
    try {
      const { svg } = await mermaid.render(id, d.diagram);
      wrap.innerHTML = svg;
    } catch(e2) {
      wrap.innerHTML = `<pre class="mermaid-err">${esc(d.diagram)}\n\n⚠ ${esc(e2.message)}</pre>`;
    }
    const box = document.createElement('div');
    box.innerHTML = '<div class="tool-box"><div class="tool-hdr">◈ GENERATED DIAGRAM</div></div>';
    box.querySelector('.tool-box').appendChild(wrap);
    const d2 = document.createElement('div');
    d2.className = 'msg sys-msg';
    d2.innerHTML = '<div class="msg-body"></div>';
    d2.querySelector('.msg-body').appendChild(box);
    $out.appendChild(d2); scrollBot();
  } catch(e) { addSys(`Diagram error: ${e.message}`,'err'); }
}

function switchModel(raw) {
  const map = {
    sonnet: 'claude-sonnet-4-6',
    opus:   'claude-opus-4-7',
    haiku:  'claude-haiku-4-5-20251001',
  };
  const m = map[raw.toLowerCase()] || raw;
  S.model = m;
  $sbM.textContent = m;
  $mDisp.textContent = m;
  addSys(`Model → ${m}`);
}

function showTokens() {
  const total = Object.values(S.tokens).reduce((a,b)=>a+b,0);
  const lines = Object.entries(S.tokens)
    .map(([a,t]) => `  ${a.padEnd(12)} ${t.toLocaleString()} tokens`).join('\n');
  addSys(`Token usage:\n${lines}\n  ${'TOTAL'.padEnd(12)} ${total.toLocaleString()} tokens`);
}

function exportChat() {
  const msgs = S.convos[S.agent];
  if (!msgs.length) { addSys('Nothing to export.'); return; }
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Terminal Export — ${S.agent}</title>
<style>body{font-family:monospace;background:#010801;color:#b8f0b8;padding:24px;max-width:820px;margin:0 auto}
h1{color:#00ff41;margin-bottom:4px}.meta{color:#3d6e3d;font-size:11px;margin-bottom:24px}
.m{margin:14px 0;padding:10px 14px;border-left:2px solid #0f2a0f}
.u{border-color:#005c18}.a{border-color:#006080}
.role{font-size:10px;color:#3d6e3d;margin-bottom:4px;letter-spacing:1px}
pre{background:#040f04;padding:10px;overflow-x:auto;border:1px solid #0f2a0f}
code{background:rgba(0,255,65,.08);padding:1px 4px}</style></head><body>
<h1>▓ AI Multi-Agent Terminal Export</h1>
<div class="meta">Agent: ${S.agent.toUpperCase()} | Model: ${S.model} | Exported: ${new Date().toISOString()}</div>
${msgs.map(m=>`<div class="m ${m.role==='user'?'u':'a'}">
<div class="role">${m.role.toUpperCase()}</div>
<div>${m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
</div>`).join('')}
</body></html>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download = `terminal-${S.agent}-${Date.now()}.html`;
  a.click();
  addSys(`Exported ${msgs.length} messages as HTML.`);
}

// ═══════════════════════════════════════════════════════════
// AGENT SWITCHING
// ═══════════════════════════════════════════════════════════
function switchAgent(agent) {
  if (S.streaming) { addSys('Cannot switch while streaming.','err'); return; }
  S.agent = agent;
  const cfg = AGENTS[agent];

  $tabs.forEach(t => t.classList.toggle('active', t.dataset.a === agent));
  $psym.style.color = cfg.color;
  $psym.style.textShadow = cfg.glow;
  $sbA.textContent = agent;
  $sbA.style.color = cfg.color;

  $out.innerHTML = '';
  const msgs = S.convos[agent];
  if (!msgs.length) {
    addSys(`─── ${cfg.label} ───`);
    showGreeting(agent);
  } else {
    addSys(`─── ${cfg.label} (${msgs.length} messages) ───`);
    msgs.forEach(m => addMsg({ role: m.role, content: m.content, agent }));
  }
  updateSB(); updateBadges();
}

// ═══════════════════════════════════════════════════════════
// STATUS BAR + BADGES
// ═══════════════════════════════════════════════════════════
function updateSB() {
  $sbT.textContent = S.tokens[S.agent].toLocaleString();
  $sbMsg.textContent = S.convos[S.agent].length;
  $sbM.textContent = S.model;
}

function updateBadges() {
  $tabs.forEach(tab => {
    const a = tab.dataset.a;
    const n = S.convos[a].length;
    let badge = tab.querySelector('.tab-badge');
    if (n > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className='tab-badge'; tab.appendChild(badge); }
      badge.textContent = n;
    } else if (badge) badge.remove();
  });
}

// ═══════════════════════════════════════════════════════════
// AUTOCOMPLETE
// ═══════════════════════════════════════════════════════════
function updateAC(val) {
  if (!val.startsWith('/')) { $ac.style.display='none'; return; }
  const hits = COMMANDS.filter(c => c.cmd.startsWith(val.toLowerCase()));
  if (!hits.length || (hits.length===1 && hits[0].cmd===val)) { $ac.style.display='none'; return; }
  $ac.innerHTML = hits.map(c =>
    `<div class="ac-item" data-cmd="${c.cmd}">
      <span class="ac-cmd">${esc(c.cmd)}</span>
      <span class="ac-hint">${esc(c.hint)}</span>
    </div>`).join('');
  $ac.style.display='block';
  $ac.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('click', () => { $input.value = el.dataset.cmd+' '; $ac.style.display='none'; $input.focus(); });
  });
}

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
$tabs.forEach(t => t.addEventListener('click', () => switchAgent(t.dataset.a)));

$input.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = $input.value.trim();
    if (v) { $input.value=''; $input.style.height='auto'; $ac.style.display='none'; sendMsg(v); }
    return;
  }
  if (e.key==='ArrowUp' && !e.shiftKey) {
    e.preventDefault();
    if (S.histIdx < S.history.length-1) { S.histIdx++; $input.value=S.history[S.histIdx]; }
    return;
  }
  if (e.key==='ArrowDown' && !e.shiftKey) {
    e.preventDefault();
    if (S.histIdx > 0) { S.histIdx--; $input.value=S.history[S.histIdx]; }
    else { S.histIdx=-1; $input.value=''; }
    return;
  }
  if (e.key==='Tab') {
    e.preventDefault();
    const first = $ac.querySelector('.ac-item');
    if (first) { $input.value=first.dataset.cmd+' '; $ac.style.display='none'; }
    return;
  }
  if (e.key==='Escape') { $ac.style.display='none'; closeModal(); }
});

$input.addEventListener('input', () => {
  $input.style.height='auto';
  $input.style.height=Math.min($input.scrollHeight,120)+'px';
  updateAC($input.value);
});

$sendBtn.addEventListener('click', () => {
  if (S.streaming) { stopStream(); return; }
  const v = $input.value.trim();
  if (v) { $input.value=''; $input.style.height='auto'; sendMsg(v); }
});

document.addEventListener('keydown', e => {
  if (e.ctrlKey||e.metaKey) {
    const agents=['researcher','coder','creative','analyst'];
    const i=parseInt(e.key)-1;
    if (i>=0&&i<4) { e.preventDefault(); switchAgent(agents[i]); }
  }
});

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
boot();
$input.focus();
</script>
</body>
</html>
