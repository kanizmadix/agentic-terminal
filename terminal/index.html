<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Fira Code',monospace; background:#010801; color:#b8f0b8; height:100vh; display:flex; flex-direction:column; }
    #header { padding:8px 16px; background:#040f04; border-bottom:1px solid #0f2a0f; color:#00ff41; font-size:12px; font-weight:700; letter-spacing:2px; display:flex; justify-content:space-between; align-items:center; }
    #output { flex:1; overflow-y:auto; padding:16px; font-size:13px; line-height:1.65; }
    #output::-webkit-scrollbar { width:3px; } #output::-webkit-scrollbar-thumb { background:#005c18; }
    #input-area { display:flex; align-items:center; padding:8px 16px; background:#040f04; border-top:1px solid #0f2a0f; gap:8px; }
    #input { flex:1; background:none; border:none; outline:none; color:#b8f0b8; font-family:inherit; font-size:13px; caret-color:#00ff41; }
    #input::placeholder { color:#3d6e3d; }
    #send { background:none; border:1px solid #005c18; color:#00ff41; padding:5px 13px; cursor:pointer; font-family:inherit; font-size:10px; letter-spacing:1px; }
    #send:hover { background:rgba(0,255,65,.09); } #send:disabled { opacity:.4; cursor:not-allowed; }
    .prompt-sym { color:#00ff41; font-size:15px; }
    .msg { margin-bottom:14px; }
    .msg-role { font-size:10px; color:#3d6e3d; margin-bottom:3px; letter-spacing:1px; font-weight:700; }
    .s-cursor { display:inline-block; width:7px; height:13px; background:#00ff41; animation:blink .7s infinite; vertical-align:middle; margin-left:2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div id="header">
    <span>▓ AI TERMINAL v0.3.0</span>
    <span style="color:#00ff41;font-size:10px">● STREAMING</span>
  </div>
  <div id="output"></div>
  <div id="input-area">
    <span class="prompt-sym">❯</span>
    <input id="input" placeholder="Type a message..." />
    <button id="send">SEND ↵</button>
  </div>
  <script>
    const $out = document.getElementById('output');
    const $in  = document.getElementById('input');
    const $btn = document.getElementById('send');
    const conversation = [];
    let streaming = false;

    function addMsg(role, text, streaming=false) {
      const d = document.createElement('div');
      d.className = 'msg';
      d.innerHTML = '<div class="msg-role">' + role + '</div><div class="msg-body">' + (streaming?'<span class="s-cursor"></span>':text) + '</div>';
      $out.appendChild(d); $out.scrollTop = $out.scrollHeight; return d;
    }

    addMsg('SYSTEM', 'Streaming SSE connected. Responses appear in real time.');

    async function sendMsg(text) {
      if (streaming) return;
      addMsg('YOU', text);
      conversation.push({ role: 'user', content: text });
      streaming = true; $btn.disabled = true;
      const aDiv = addMsg('AI', '', true);
      const body = aDiv.querySelector('.msg-body');
      let full = '';
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ messages: conversation }),
        });
        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const d = JSON.parse(line.slice(6));
              if (d.type === 'text') { full += d.text; body.innerHTML = full + '<span class="s-cursor"></span>'; $out.scrollTop=$out.scrollHeight; }
            } catch {}
          }
        }
        body.textContent = full;
        conversation.push({ role: 'assistant', content: full });
      } catch(e) { body.textContent = 'Error: ' + e.message; }
      streaming = false; $btn.disabled = false; $in.focus();
    }

    $btn.addEventListener('click', () => { const v=$in.value.trim(); if(!v) return; $in.value=''; sendMsg(v); });
    $in.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$btn.click();} });
  </script>
</body>
</html>
